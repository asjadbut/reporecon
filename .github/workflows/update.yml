name: Update RepoRecon Dataset

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RepoRecon
        uses: actions/checkout@v4

      - name: Clone bounty-targets-data
        run: |
          git clone https://github.com/arkadiyt/bounty-targets-data.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Copy dataset files
        run: |
          cp bounty-targets-data/data/*.json .

      - name: Run extraction script
        run: |
          python scripts/extract_repos.py

      - name: Commit updated dataset
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/repos.json
          git commit -m "Update RepoRecon dataset" || echo "No changes"
          git push